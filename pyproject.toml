[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "static/",
]

[tool.ruff.lint]
# E/W: pycodestyle  F: pyflakes  I: isort
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
# shell.py is an interactive REPL helper; its imports are used interactively.
"shell.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Ensure project root is importable so tests can `from utils import ...` etc.
pythonpath = ["."]
